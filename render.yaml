services:
  - type: web
    name: betta-app
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: starter
    disk:
      name: betta-storage
      mountPath: /app/storage
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: betta-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: STORAGE_PATH
        value: /app/storage
    healthCheckPath: /api/health

databases:
  - name: betta-db
    plan: starter
    databaseName: betta
    user: beta
