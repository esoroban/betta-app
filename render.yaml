services:
  - type: web
    name: betta-app
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: betta-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: betta-assets
      - key: S3_PUBLIC_URL
        sync: false
    healthCheckPath: /api/health

databases:
  - name: betta-db
    plan: free
    databaseName: betta
    user: beta
