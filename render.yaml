services:
  - type: web
    name: betta-app
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: betta-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

databases:
  - name: betta-db
    plan: free
    databaseName: betta
    user: beta
